<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Citizen Dashboard · CivicFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared.js"></script>
</head>

<body class="min-h-screen bg-[#0f0f1a] text-white">
    <div class="fixed inset-0 -z-10 pointer-events-none">
        <div class="orb w-[500px] h-[500px] bg-violet-600 top-[-150px] left-[-100px]"></div>
        <div class="orb w-[500px] h-[500px] bg-cyan-500 bottom-[-200px] right-[-100px]"></div>
    </div>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="hidden md:flex flex-col w-64 p-4 glass-strong m-4 rounded-2xl">
            <div class="flex items-center gap-2 px-2 py-3">
                <div class="w-8 h-8 rounded-lg grad-btn flex items-center justify-center font-bold">C</div>
                <span class="font-bold">CivicFlow</span>
            </div>
            <nav class="mt-4 space-y-1 text-sm">
                <a href="#complaints" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-white/10">📋 My
                    Complaints</a>
                <a href="#new" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white/5 transition">➕ New
                    Complaint</a>
            </nav>
            <div class="mt-auto space-y-3">
                <div class="glass-card p-3">
                    <div class="text-xs text-white/50">Signed in as</div>
                    <div id="side-user" class="font-semibold truncate">—</div>
                    <div class="text-xs text-white/50 mt-1">Citizen</div>
                </div>
                <button onclick="logout()"
                    class="w-full py-2 rounded-xl border border-white/10 hover:bg-white/5 transition text-sm">Logout</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 p-4 md:p-8 space-y-8 max-w-5xl">
            <header class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold">Citizen Portal</h1>
                    <p class="text-white/60 text-sm">Report issues and track their resolution.</p>
                </div>
                <button onclick="logout()" class="md:hidden px-3 py-2 rounded-lg glass-card text-sm">Logout</button>
            </header>

            <!-- New complaint -->
            <section id="new" class="glass-card p-6 animate-fade-up">
                <h2 class="text-xl font-semibold mb-1">Submit a new complaint</h2>
                <p class="text-white/60 text-sm mb-4">Provide details and a photo so we can triage faster.</p>
                <form id="complaint-form" class="grid md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="text-xs uppercase tracking-wider text-white/60">Title</label>
                        <input name="title" required placeholder="Broken street light on Main St" class="mt-1" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-xs uppercase tracking-wider text-white/60">Description</label>
                        <textarea name="description" required rows="3" placeholder="Describe the issue..."
                            class="mt-1"></textarea>
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-xs uppercase tracking-wider text-white/60">Address</label>
                        <input name="address" required placeholder="123 Main St, Springfield" class="mt-1" />
                    </div>
                    <div>
                        <label class="text-xs uppercase tracking-wider text-white/60">Longitude</label>
                        <input name="longitude" type="number" step="any" required placeholder="-73.9857" class="mt-1" />
                    </div>
                    <div>
                        <label class="text-xs uppercase tracking-wider text-white/60">Latitude</label>
                        <input name="latitude" type="number" step="any" required placeholder="40.7484" class="mt-1" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-xs uppercase tracking-wider text-white/60">Photo</label>
                        <input name="image" type="file" accept="image/*" required class="mt-1" />
                    </div>
                    <div class="md:col-span-2 flex items-center gap-3">
                        <button id="submit-btn" type="submit" class="grad-btn px-6 py-3 rounded-xl font-semibold">Submit
                            Complaint</button>
                        <button type="button" id="geo-btn"
                            class="glass-card px-4 py-3 rounded-xl text-sm hover:bg-white/10 transition">📍 Use my
                            location</button>
                    </div>
                </form>
            </section>

            <!-- Complaints list -->
            <section id="complaints">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold">My complaints</h2>
                    <button id="refresh-btn" class="text-sm text-white/60 hover:text-white transition">↻
                        Refresh</button>
                </div>
                <div id="complaints-list" class="grid md:grid-cols-2 gap-4">
                    <div class="glass-card p-6 text-white/50 text-sm">Loading...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- AI Result modal -->
    <div id="ai-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-6 bg-black/60 backdrop-blur-sm">
        <div class="glass-strong rounded-2xl p-8 max-w-md w-full animate-pop text-center">
            <div class="w-16 h-16 mx-auto rounded-full grad-btn flex items-center justify-center text-3xl mb-4">✨</div>
            <h3 class="text-2xl font-bold">AI Analysis</h3>
            <p class="text-white/60 text-sm mt-1">Your complaint was triaged.</p>
            <div class="grid grid-cols-2 gap-3 mt-6">
                <div class="glass-card p-4">
                    <div class="text-xs uppercase text-white/50">Category</div>
                    <div id="ai-category" class="text-lg font-semibold mt-1 grad-text">—</div>
                </div>
                <div class="glass-card p-4">
                    <div class="text-xs uppercase text-white/50">Priority</div>
                    <div id="ai-priority" class="text-lg font-semibold mt-1 grad-text">—</div>
                </div>
            </div>
            <button
                onclick="document.getElementById('ai-modal').classList.add('hidden');document.getElementById('ai-modal').classList.remove('flex')"
                class="grad-btn mt-6 w-full py-3 rounded-xl font-semibold">Got it</button>
        </div>
    </div>

    <script>
        if (!requireAuth(['citizen'])) { } else {
            document.getElementById('side-user').textContent = getUser() || 'Citizen';

            async function loadComplaints() {
                const list = document.getElementById('complaints-list');
                list.innerHTML = '<div class="glass-card p-6 text-white/50 text-sm">Loading...</div>';
                try {
                    // Try common endpoints
                    let data;
                    try {
                        data = await apiFetch('/complaints/complaints');
                    } catch (err) {
                        throw err;
                    }
                    const items = Array.isArray(data)
                        ? data
                        : (data.data?.complaints || data.complaints || []);
                    if (!items.length) {
                        list.innerHTML = '<div class="glass-card p-6 text-white/50 text-sm md:col-span-2">No complaints yet. Submit one above.</div>';
                        return;
                    }
                    list.innerHTML = items.map(c => `
        <div class="glass-card tilt p-5">
          <div class="flex items-start justify-between gap-3">
            <h3 class="font-semibold">${c.title || 'Untitled'}</h3>
            ${statusBadge(c.status)}
          </div>
          <p class="text-white/60 text-sm mt-2 line-clamp-3">${c.description || ''}</p>
          <div class="flex flex-wrap gap-2 mt-3 text-xs text-white/50">
            ${c.category ? `<span class="glass-card px-2 py-1 rounded">📂 ${c.category}</span>` : ''}
            ${c.priority ? `<span class="glass-card px-2 py-1 rounded">⚡ ${c.priority}</span>` : ''}
            ${c.location?.address ? `<span class="glass-card px-2 py-1 rounded">📍 ${c.location.address}</span>` : ''}
          </div>
        </div>
      `).join('');
                } catch (err) {
                    list.innerHTML = `<div class="glass-card p-6 text-white/50 text-sm md:col-span-2">Could not load complaints: ${err.message}</div>`;
                }
            }
            loadComplaints();
            document.getElementById('refresh-btn').onclick = loadComplaints;

            document.getElementById('geo-btn').onclick = () => {
                if (!navigator.geolocation) return toast('Geolocation not supported', 'error');
                navigator.geolocation.getCurrentPosition(pos => {
                    document.querySelector('[name=longitude]').value = pos.coords.longitude;
                    document.querySelector('[name=latitude]').value = pos.coords.latitude;
                    toast('Location filled', 'success');
                }, () => toast('Could not get location', 'error'));
            };

            document.getElementById('complaint-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submit-btn');
                const orig = btn.innerHTML;
                btn.disabled = true; btn.innerHTML = spinner() + ' Submitting...';
                try {
                    const fd = new FormData(e.target);
                    const data = await apiFetch('/complaints/create', { method: 'POST', body: fd });
                    const c = data.data?.complaint || data.complaint || data;
                    const category = c.category || c.aiMetadata?.aiSuggestedCategory || c.aiCategory || 'General';
                    const priority = c.priority || c.aiMetadata?.aiSuggestedPriority || c.aiPriority || 'Medium';
                    document.getElementById('ai-category').textContent = category;
                    document.getElementById('ai-priority').textContent = priority;
                    const modal = document.getElementById('ai-modal');
                    modal.classList.remove('hidden'); modal.classList.add('flex');
                    e.target.reset();
                    loadComplaints();
                    toast('Complaint submitted', 'success');
                } catch (err) {
                    toast(err.message || 'Submission failed', 'error');
                } finally {
                    btn.disabled = false; btn.innerHTML = orig;
                }
            });
        }
    </script>
</body>

</html>
